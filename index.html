function fmtMoney(n){n=Number(n);if(n>=1e6)return '$'+(n/1e6).toFixed(1)+'M';if(n>=1e4)return '$'+(n/1e4).toFixed(1)+'萬';return '$'+fmt(n)}

      <td style="white-space:nowrap">${r.date_str}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.subject}">${r.subject}</td>
      <td><span class="tag">${r.audience||'-'}</span></td>
      <td>${r.send_type}</td><td>${fmt(r.reach)}</td>
      <td>${rateBadge(r.open_rate,28,38)}</td>
      <td>${r.click_rate!=null?fmtPct(r.click_rate):'-'}</td>
      <td>${r.orders}</td><td>${fmtMoney(r.revenue)}</td></tr>`).join('')}</tbody></table>`;
  }
}
// PAGE 3
let p3Chart=null;let p3Metric='open';let p3Aud=null;
const P3C=['#06C755','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#14b8a6','#a855f7','#eab308','#6366f1','#10b981','#f43f5e'];
function buildP3(){
  const el=document.getElementById('p3');
  el.innerHTML=`
  <div class="filter-bar">
    <label>指標：</label>
    <select onchange="p3Metric=this.value;renderP3Chart()">
      <option value="open">開封率</option><option value="click">點擊率</option><option value="conv">轉換率</option>
    </select>
    <label style="margin-left:8px;font-size:11px;color:#aaa">點擊分眾卡片可單獨顯示</label>
  </div>
  <div class="card" style="margin-bottom:18px">
    <h3>📈 各分眾月份趨勢</h3>
    <div class="chart-wrap" style="height:300px"><canvas id="c-p3" role="img" aria-label="分眾月份趨勢折線圖">分眾月份趨勢</canvas></div>
  </div>
  <div class="sparkline-row">${D.aud_summary.map(a=>`
    <div class="aud-card" onclick="toggleP3Aud('${a.audience}')" id="acard-${a.audience.replace(/[^a-zA-Z0-9]/g,'_')}">
      <h4>${a.audience}</h4>
      <div class="mini-kpis">
        <div class="mini-kpi"><div class="mv">${fmtPct(a.open)}</div><div class="ml">開封率</div></div>
        <div class="mini-kpi"><div class="mv">${fmtPct(a.click)}</div><div class="ml">點擊率</div></div>
        <div class="mini-kpi"><div class="mv">${fmt(a.orders)}</div><div class="ml">訂單</div></div>
        <div class="mini-kpi"><div class="mv">${fmtMoney(a.revenue)}</div><div class="ml">營收</div></div>
      </div>
    </div>`).join('')}</div>`;
  renderP3Chart();
}
function renderP3Chart(){
  if(p3Chart){p3Chart.destroy();p3Chart=null;}
  const auds=p3Aud?[p3Aud]:D.aud_summary.slice(0,8).map(a=>a.audience);
  const datasets=auds.map((aud,i)=>{
    const pts=D.aud_monthly[aud]||[];
    return{label:aud,data:pts.map(p=>p[p3Metric]),borderColor:P3C[i%P3C.length],backgroundColor:'transparent',tension:.3,spanGaps:true,pointRadius:3};
  });
  p3Chart=new Chart(document.getElementById('c-p3'),{type:'line',
    data:{labels:MONTHS.map(ymLabel),datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{boxWidth:8,font:{size:10}}}},
      scales:{y:{ticks:{callback:v=>v==null?'':v.toFixed(1)+'%'}}}}
  });
}
function toggleP3Aud(aud){
  p3Aud=p3Aud===aud?null:aud;
  document.querySelectorAll('.aud-card').forEach(c=>c.classList.remove('selected'));
  if(p3Aud){const id='acard-'+aud.replace(/[^a-zA-Z0-9]/g,'_');const el=document.getElementById(id);if(el)el.classList.add('selected');}
  renderP3Chart();
}
// PAGE 4
let p4Aud=D.aud_summary[0]?.audience||'';
let p4Metric='open_rate';
function buildP4(){
  const el=document.getElementById('p4');
  const auds=D.aud_summary;
  el.innerHTML=`<div class="filter-bar">
    <label>分眾：</label>
    <select onchange="p4Aud=this.value;renderP4()" id="p4-aud-sel">
      ${auds.map(a=>`<option value="${a.audience}">${a.audience}</option>`).join('')}
    </select>
    <label>排序：</label>
    <select onchange="p4Metric=this.value;renderP4()">
      <option value="open_rate">開封率</option><option value="click_rate">點擊率</option>
      <option value="revenue">營業額</option><option value="orders">訂單數</option>
    </select>
  </div><div id="p4-content"></div>`;
  renderP4();
}
function renderP4(){
  const aud=p4Aud;
  const rows=(D.aud_detail[aud]||[]).sort((a,b)=>{const av=a[p4Metric]??-1,bv=b[p4Metric]??-1;return bv-av;});
  const summary=D.aud_summary.find(a=>a.audience===aud)||{};
  const stCross=D.aud_st_cross[aud]||{};
  const stKeys=Object.keys(stCross);
  document.getElementById('p4-content').innerHTML=`
  <div class="kpi-grid" style="grid-template-columns:repeat(6,1fr);margin-bottom:18px">
    <div class="kpi blue"><div class="label">開封率</div><div class="value">${fmtPct(summary.open)}</div></div>
    <div class="kpi"><div class="label">點擊率</div><div class="value">${fmtPct(summary.click)}</div></div>
    <div class="kpi orange"><div class="label">轉換率</div><div class="value">${fmtPct(summary.conv)}</div></div>
    <div class="kpi purple"><div class="label">訂單數</div><div class="value">${fmt(summary.orders)}</div></div>
    <div class="kpi green"><div class="label">營業額</div><div class="value">${fmtMoney(summary.revenue||0)}</div></div>
    <div class="kpi"><div class="label">客單價</div><div class="value">${fmt(summary.aov)}</div></div>
  </div>
  ${stKeys.length>0?`<div class="card" style="margin-bottom:18px"><h3>發送類型 × 此分眾 績效</h3>
    <table><thead><tr><th>發送類型</th><th>次數</th><th>開封率</th><th>點擊率</th><th>訂單</th><th>營業額</th><th>轉換率</th></tr></thead>
    <tbody>${stKeys.sort((a,b)=>stCross[b].open-stCross[a].open).map(st=>{const s=stCross[st];return`<tr>
      <td><strong>${st}</strong></td><td>${s.n}</td><td>${rateBadge(s.open,28,38)}</td><td>${rateBadge(s.click,3,6)}</td>
      <td>${fmt(s.orders)}</td><td>${fmtMoney(s.revenue)}</td><td>${fmtPct(s.conv)}</td></tr>`;}).join('')}</tbody></table></div>`:''}
  <div class="card"><h3>廣播明細（共 ${rows.length} 筆）</h3>
    <table><thead><tr><th>日期</th><th>月份</th><th>發送主題</th><th>類型</th><th>觸及</th><th>開封率</th><th>vs均值</th><th>點擊率</th><th>訂單</th><th>營收</th></tr></thead>
    <tbody>${rows.map(r=>{
      const diff=r.open_rate-r.aud_avg;
      const diffStr=`<span style="color:${diff>=0?'#06C755':'#ef4444'}">${diff>=0?'+':''}${diff.toFixed(1)}%</span>`;
      return`<tr>
        <td style="white-space:nowrap">${r.date_str}</td><td>${ymLabel(r.ym)}</td>
        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.subject}">${r.subject}</td>
        <td>${r.send_type}</td><td>${fmt(r.reach)}</td>
        <td>${rateBadge(r.open_rate,28,38)}</td><td>${diffStr}</td>
        <td>${r.click_rate!=null?fmtPct(r.click_rate):'-'}</td>
        <td>${r.orders}</td><td>${fmtMoney(r.revenue)}</td></tr>`;
    }).join('')}</tbody></table></div>`;
}
buildP1();buildP2();buildP3();buildP4();
</script>
</body>
</html>
